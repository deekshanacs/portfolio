<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deekshana's World</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="pixel-background"></div>

  <div class="container">
    <div class="header-card pixel-box">
      <h1 id="hero-name">Deekshana C S</h1>
      <p id="hero-role" class="subheading">AI & Full Stack Developer</p>
      <p id="hero-headline" class="bio-text"></p>
      <p id="hero-summary" class="bio-text"></p>
    </div>

    <div class="content-wrapper">
      <aside class="sidebar pixel-box">
        <h3>Destinations</h3>
        <nav class="destination-menu">
          <a href="#about" class="dest-btn">about</a>
          <a href="#skills" class="dest-btn">skills</a>
          <a href="#experience" class="dest-btn">experience</a>
          <a href="#research" class="dest-btn">research</a>
          <a href="#projects" class="dest-btn">projects</a>
          <a href="#education" class="dest-btn">education</a>
          <a href="#achievements" class="dest-btn">achievements</a>
          <a href="#extra" class="dest-btn">extra</a>
          <a href="#contact" class="dest-btn">contact</a>
        </nav>
      </aside>

      <main class="main-content">
        <section id="about" class="content-section pixel-box">
          <h2 class="section-title">About</h2>
          <div id="about-content"></div>
        </section>

        <section id="skills" class="content-section pixel-box">
          <h2 class="section-title">Skills</h2>
          <div id="skills-content"></div>
        </section>

        <section id="experience" class="content-section pixel-box">
          <h2 class="section-title">Experience</h2>
          <div id="experience-content"></div>
        </section>

        <section id="research" class="content-section pixel-box">
          <h2 class="section-title">Research</h2>
          <div id="research-content"></div>
        </section>

        <section id="projects" class="content-section pixel-box">
          <h2 class="section-title">Projects</h2>
          <div id="projects-content"></div>
        </section>

        <section id="education" class="content-section pixel-box">
          <h2 class="section-title">Education</h2>
          <div id="education-content"></div>
        </section>

        <section id="achievements" class="content-section pixel-box">
          <h2 class="section-title">Achievements</h2>
          <div id="achievements-content"></div>
        </section>

        <section id="extra" class="content-section pixel-box">
          <h2 class="section-title">Languages & Interests</h2>
          <div id="extra-content"></div>
        </section>

        <section id="contact" class="content-section pixel-box">
          <h2 class="section-title">Contact</h2>
          <div id="contact-content"></div>
        </section>
      </main>
    </div>

  </div>

  <script src="/app.js"></script>
</body>
</html>
